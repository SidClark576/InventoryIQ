<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>InventoryIQ | Add Asset</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#f9f9ff", "error": "#ba1a1a", "error-container": "#ffdad6", "inverse-on-surface": "#eff0fa",
            "inverse-primary": "#aac7ff", "inverse-surface": "#2d3038", "on-background": "#181c22", "on-error": "#ffffff",
            "on-error-container": "#93000a", "on-primary": "#ffffff", "on-primary-container": "#fefcff", "on-primary-fixed": "#001b3e",
            "on-primary-fixed-variant": "#00458d", "on-secondary": "#ffffff", "on-secondary-container": "#405882", "on-secondary-fixed": "#001b3e",
            "on-secondary-fixed-variant": "#2e4770", "on-surface": "#181c22", "on-surface-variant": "#414753", "on-tertiary": "#ffffff",
            "on-tertiary-container": "#fffbff", "on-tertiary-fixed": "#321200", "on-tertiary-fixed-variant": "#763400", "outline": "#717785",
            "outline-variant": "#c1c6d5", "primary": "#005ab4", "primary-container": "#0873df", "primary-fixed": "#d6e3ff",
            "primary-fixed-dim": "#aac7ff", "secondary": "#465f89", "secondary-container": "#b7cfff", "secondary-fixed": "#d6e3ff",
            "secondary-fixed-dim": "#afc7f7", "surface": "#f9f9ff", "surface-bright": "#f9f9ff", "surface-container": "#ecedf7",
            "surface-container-high": "#e6e8f1", "surface-container-highest": "#e0e2ec", "surface-container-low": "#f2f3fd", "surface-container-lowest": "#ffffff",
            "surface-dim": "#d8dae3", "surface-tint": "#005db8", "surface-variant": "#e0e2ec", "tertiary": "#964400",
            "tertiary-container": "#bd5700", "tertiary-fixed": "#ffdbc9", "tertiary-fixed-dim": "#ffb68c",
            "primary-dim": "#00458d", "secondary-dim": "#2e4770", "tertiary-dim": "#763400", "error-dim": "#93000a",
            "slate-950": "#f9f9ff", "slate-400": "#414753", "slate-500": "#717785", "slate-200": "#181c22"
          },
          fontFamily: { "body": ["Inter"], "headline": ["Inter"] },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="selection:bg-primary/30 antialiased">
  <div class="h-screen overflow-hidden flex bg-[#f5f6fa]">

    <!-- Sidebar -->
    <aside class="w-[260px] bg-white border-r border-gray-200 flex flex-col justify-between shrink-0">
      <div>
        <div class="h-24 flex items-center px-6 border-b border-gray-100">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-[#060e20] rounded-xl flex items-center justify-center p-2 shadow-sm">
              <svg viewBox="0 0 100 100" class="w-full h-full">
                <polygon points="50,15 85,35 50,55 15,35" fill="#fbbd5c" />
                <polygon points="15,35 50,55 50,90 15,70" fill="#f26d5b" />
                <polygon points="85,35 50,55 50,90 85,70" fill="#9c3f91" />
              </svg>
            </div>
            <div class="flex flex-col">
              <span class="text-[17px] font-bold text-gray-900 leading-tight">InventoryIQ</span>
              <span class="text-[10px] font-bold text-gray-400 tracking-wider uppercase mt-0.5">Management Portal</span>
            </div>
          </div>
        </div>

        <nav class="p-4 space-y-1.5 mt-2">
          <a href="dashboard.html" data-page="dashboard"
            class="nav-btn flex items-center gap-3 w-full px-4 py-3 text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-xl text-sm transition-colors border-l-4 border-transparent">
            <span class="material-symbols-outlined text-xl">grid_view</span> Dashboard
          </a>
          <a href="inventory.html" data-page="inventory"
            class="nav-btn flex items-center gap-3 w-full px-4 py-3 text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-xl text-sm transition-colors border-l-4 border-transparent">
            <span class="material-symbols-outlined text-xl">inventory_2</span> Inventory
          </a>
          <a href="insights.html" data-page="insights"
            class="nav-btn flex items-center gap-3 w-full px-4 py-3 text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-xl text-sm transition-colors border-l-4 border-transparent">
            <span class="material-symbols-outlined text-xl">bar_chart</span> Insights
          </a>
        </nav>
      </div>

      <div class="p-4 space-y-1 mb-2 border-t border-gray-100 pt-6">
        <button class="flex items-center gap-3 w-full px-4 py-3 text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-xl font-medium text-sm transition-colors">
          <span class="material-symbols-outlined text-xl">help</span> Help Center
        </button>
        <button
          class="flex items-center gap-3 w-full px-4 py-3 text-red-600 hover:bg-red-50 rounded-xl font-medium text-sm transition-colors cursor-pointer"
          onclick="handleLogout()">
          <span class="material-symbols-outlined text-xl">logout</span> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-24 bg-white border-b border-gray-100 flex items-center justify-between px-10 shrink-0">
        <div class="relative w-[480px]">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">search</span>
          <input type="text" placeholder="Search inventory, assets, or orders..."
            class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-transparent rounded-xl text-sm focus:border-gray-200 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-50 transition-all font-medium" />
        </div>
        <div class="flex items-center gap-6">
          <button class="text-gray-400 hover:text-gray-700 relative w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-50 transition">
            <span class="material-symbols-outlined">notifications</span>
            <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
          </button>
          <button class="text-gray-400 hover:text-gray-700 w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-50 transition">
            <span class="material-symbols-outlined">settings</span>
          </button>
          <div class="h-10 w-px bg-gray-200 ml-2 mr-2"></div>
          <div class="flex items-center gap-3 pr-2">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#005ab4] to-indigo-600 flex items-center justify-center text-white font-bold text-sm shadow-sm opacity-90" id="nav-avatar">A</div>
            <span class="text-sm font-bold text-gray-700" id="nav-email"></span>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-10 space-y-8">
        <div>
          <h1 id="form-title" class="text-3xl font-black text-gray-900 tracking-tight">Add Asset</h1>
        </div>
        <div class="bg-white rounded-3xl p-10 max-w-3xl shadow-sm border border-gray-200">
          <input type="hidden" id="edit-id" />
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full">
              <label class="block text-[11px] font-bold uppercase tracking-widest text-gray-500 mb-2">Product Name *</label>
              <input type="text" id="f-name"
                class="w-full rounded-xl px-5 py-4 bg-gray-50 border border-transparent focus:bg-white focus:border-gray-200 focus:ring-4 focus:ring-indigo-50 transition-all font-medium text-gray-900"
                placeholder="e.g. Pro Studio Display" />
            </div>
            <div>
              <label class="block text-[11px] font-bold uppercase tracking-widest text-gray-500 mb-2">Category</label>
              <input type="text" id="f-category"
                class="w-full rounded-xl px-5 py-4 bg-gray-50 border border-transparent focus:bg-white focus:border-gray-200 focus:ring-4 focus:ring-indigo-50 transition-all font-medium text-gray-900"
                placeholder="e.g. Electronics" />
            </div>
            <div>
              <label class="block text-[11px] font-bold uppercase tracking-widest text-gray-500 mb-2">Price ($)</label>
              <input type="number" id="f-price"
                class="w-full rounded-xl px-5 py-4 bg-gray-50 border border-transparent focus:bg-white focus:border-gray-200 focus:ring-4 focus:ring-indigo-50 transition-all font-medium text-gray-900"
                placeholder="0.00" step="0.01" min="0" />
            </div>
            <div>
              <label class="block text-[11px] font-bold uppercase tracking-widest text-gray-500 mb-2">Quantity</label>
              <input type="number" id="f-quantity"
                class="w-full rounded-xl px-5 py-4 bg-gray-50 border border-transparent focus:bg-white focus:border-gray-200 focus:ring-4 focus:ring-indigo-50 transition-all font-medium text-gray-900"
                placeholder="0" min="0" />
            </div>
            <div>
              <label class="block text-[11px] font-bold uppercase tracking-widest text-gray-500 mb-2">Low Stock Threshold</label>
              <input type="number" id="f-threshold"
                class="w-full rounded-xl px-5 py-4 bg-gray-50 border border-transparent focus:bg-white focus:border-gray-200 focus:ring-4 focus:ring-indigo-50 transition-all font-medium text-gray-900"
                placeholder="10" min="0" />
            </div>
            <div class="col-span-full">
              <label class="block text-[11px] font-bold uppercase tracking-widest text-gray-500 mb-2">Description</label>
              <textarea id="f-description"
                class="w-full rounded-xl px-5 py-4 bg-gray-50 border border-transparent focus:bg-white focus:border-gray-200 focus:ring-4 focus:ring-indigo-50 transition-all font-medium text-gray-900 min-h-[100px]"
                placeholder="Optional details..."></textarea>
            </div>
          </div>
          <div class="flex gap-4 mt-10 pt-8 border-t border-gray-100">
            <button
              class="bg-[#005ab4] hover:bg-[#00458d] text-white px-10 py-4 rounded-xl font-bold shadow-sm transition-all cursor-pointer"
              onclick="handleSaveItem()">Save Asset</button>
            <button
              class="px-10 py-4 rounded-xl font-bold text-gray-700 bg-white border border-gray-200 hover:bg-gray-50 transition-all cursor-pointer"
              onclick="window.location.href='dashboard.html'">Cancel</button>
          </div>
          <div id="form-msg" class="mt-4 text-sm font-semibold"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script>
    requireAuth();
    initNav('');

    function clearForm() {
      document.getElementById('edit-id').value = '';
      document.getElementById('form-title').textContent = 'Add Asset';
      ['f-name', 'f-category', 'f-price', 'f-quantity', 'f-threshold', 'f-description'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('form-msg').textContent = '';
    }

    // Pre-populate form if editing
    const raw = sessionStorage.getItem('iq_editItem');
    if (raw) {
      sessionStorage.removeItem('iq_editItem');
      const it = JSON.parse(raw);
      document.getElementById('edit-id').value = it.itemID;
      document.getElementById('form-title').textContent = 'Edit Asset';
      document.getElementById('f-name').value = it.name || '';
      document.getElementById('f-category').value = it.category || '';
      document.getElementById('f-price').value = it.price || '';
      document.getElementById('f-quantity').value = it.quantity ?? '';
      document.getElementById('f-threshold').value = it.lowStockThreshold ?? '';
      document.getElementById('f-description').value = it.description || '';
    } else {
      clearForm();
    }

    async function handleSaveItem() {
      const id = document.getElementById('edit-id').value;
      const m = document.getElementById('form-msg');
      const p = {
        name: document.getElementById('f-name').value.trim(),
        category: document.getElementById('f-category').value.trim(),
        price: parseFloat(document.getElementById('f-price').value) || 0,
        quantity: parseInt(document.getElementById('f-quantity').value) || 0,
        lowStockThreshold: parseInt(document.getElementById('f-threshold').value) || 10,
        description: document.getElementById('f-description').value.trim(),
        userID: sessionStorage.getItem('userEmail') || ''
      };
      if (!p.name) { m.style.color = '#ba1a1a'; m.textContent = 'Name required.'; return; }
      m.style.color = '#005ab4'; m.textContent = 'Saving...';
      try {
        const r = id ? await updateItem(id, p) : await addItem(p);
        m.style.color = '#964400'; m.textContent = '✅ ' + (r.message || 'Saved!');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
      } catch (e) {
        m.style.color = '#ba1a1a'; m.textContent = '❌ ' + e.message;
      }
    }
  </script>
</body>
</html>
