<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>InventoryIQ | Transactions</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#f9f9ff", "error": "#ba1a1a", "error-container": "#ffdad6", "inverse-on-surface": "#eff0fa",
            "inverse-primary": "#aac7ff", "inverse-surface": "#2d3038", "on-background": "#181c22", "on-error": "#ffffff",
            "on-error-container": "#93000a", "on-primary": "#ffffff", "on-primary-container": "#fefcff", "on-primary-fixed": "#001b3e",
            "on-primary-fixed-variant": "#00458d", "on-secondary": "#ffffff", "on-secondary-container": "#405882", "on-secondary-fixed": "#001b3e",
            "on-secondary-fixed-variant": "#2e4770", "on-surface": "#181c22", "on-surface-variant": "#414753", "on-tertiary": "#ffffff",
            "on-tertiary-container": "#fffbff", "on-tertiary-fixed": "#321200", "on-tertiary-fixed-variant": "#763400", "outline": "#717785",
            "outline-variant": "#c1c6d5", "primary": "#005ab4", "primary-container": "#0873df", "primary-fixed": "#d6e3ff",
            "primary-fixed-dim": "#aac7ff", "secondary": "#465f89", "secondary-container": "#b7cfff", "secondary-fixed": "#d6e3ff",
            "secondary-fixed-dim": "#afc7f7", "surface": "#f9f9ff", "surface-bright": "#f9f9ff", "surface-container": "#ecedf7",
            "surface-container-high": "#e6e8f1", "surface-container-highest": "#e0e2ec", "surface-container-low": "#f2f3fd", "surface-container-lowest": "#ffffff",
            "surface-dim": "#d8dae3", "surface-tint": "#005db8", "surface-variant": "#e0e2ec", "tertiary": "#964400",
            "tertiary-container": "#bd5700", "tertiary-fixed": "#ffdbc9", "tertiary-fixed-dim": "#ffb68c",
            "primary-dim": "#00458d", "secondary-dim": "#2e4770", "tertiary-dim": "#763400", "error-dim": "#93000a",
            "slate-950": "#f9f9ff", "slate-400": "#414753", "slate-500": "#717785", "slate-200": "#181c22"
          },
          fontFamily: { "body": ["Inter"], "headline": ["Inter"] },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="selection:bg-primary/30 antialiased">
  <div class="h-screen overflow-hidden flex bg-[#f5f6fa]">

    <!-- Sidebar -->
    <aside class="w-[260px] bg-white border-r border-gray-200 flex flex-col justify-between shrink-0">
      <div>
        <div class="h-24 flex items-center px-6 border-b border-gray-100">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-[#060e20] rounded-xl flex items-center justify-center p-2 shadow-sm">
              <svg viewBox="0 0 100 100" class="w-full h-full">
                <polygon points="50,15 85,35 50,55 15,35" fill="#fbbd5c" />
                <polygon points="15,35 50,55 50,90 15,70" fill="#f26d5b" />
                <polygon points="85,35 50,55 50,90 85,70" fill="#9c3f91" />
              </svg>
            </div>
            <div class="flex flex-col">
              <span class="text-[17px] font-bold text-gray-900 leading-tight">InventoryIQ</span>
            </div>
          </div>
        </div>

        <nav class="p-4 space-y-1.5 mt-2">
          <a href="dashboard.html" data-page="dashboard"
            class="nav-btn flex items-center gap-3 w-full px-4 py-3 text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-xl text-sm transition-colors border-l-4 border-transparent">
            <span class="material-symbols-outlined text-xl">grid_view</span> Dashboard
          </a>
          <a href="inventory.html" data-page="inventory"
            class="nav-btn flex items-center gap-3 w-full px-4 py-3 text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-xl text-sm transition-colors border-l-4 border-transparent">
            <span class="material-symbols-outlined text-xl">inventory_2</span> Inventory
          </a>
          <a href="insights.html" data-page="insights"
            class="nav-btn flex items-center gap-3 w-full px-4 py-3 text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-xl text-sm transition-colors border-l-4 border-transparent">
            <span class="material-symbols-outlined text-xl">bar_chart</span> Insights
          </a>
          <a href="transactions.html" data-page="transactions"
            class="nav-btn flex items-center gap-3 w-full px-4 py-3 text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-xl text-sm transition-colors border-l-4 border-transparent">
            <span class="material-symbols-outlined text-xl">receipt_long</span> Transactions
          </a>
        </nav>
      </div>

      <div class="p-4 space-y-1 mb-2 border-t border-gray-100 pt-6">
        <button
          class="flex items-center gap-3 w-full px-4 py-3 text-red-600 hover:bg-red-50 rounded-xl font-medium text-sm transition-colors cursor-pointer"
          onclick="handleLogout()">
          <span class="material-symbols-outlined text-xl">logout</span> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-24 bg-white border-b border-gray-100 flex items-center justify-between px-10 shrink-0">
        <div class="ml-auto flex items-center gap-3">
          <span class="text-sm font-bold text-gray-700" id="nav-email"></span>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-10 space-y-8">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Transaction Log</h1>
            <p class="text-gray-500 mt-2 font-medium">Running history of all changes.</p>
          </div>
          <button
            class="bg-white border border-gray-200 px-5 py-2.5 rounded-xl font-bold text-[13px] text-[#005ab4] shadow-sm hover:bg-gray-50 transition flex items-center gap-2 cursor-pointer"
            onclick="loadTransactions()">
            <span class="material-symbols-outlined font-bold text-[18px]">refresh</span> Refresh
          </button>
        </div>

        <!-- Filters -->
        <div class="flex items-center gap-4">
          <div class="relative w-[300px]">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">search</span>
            <input type="text" placeholder="Search transactions..." id="tx-search"
              class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-transparent rounded-xl text-sm focus:border-gray-200 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-50 transition-all font-medium"
              oninput="applyFilters()" />
          </div>
          <select id="tx-filter"
            class="rounded-xl px-6.5 py-2 bg-white border border-gray-200 text-[13px] font-semibold text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-100 cursor-pointer"
            onchange="applyFilters()">
            <option value="">All Types</option>
            <option value="stock_in">Stock In</option>
            <option value="stock_out">Stock Out</option>
            <option value="create">Create</option>
            <option value="update">Update</option>
            <option value="delete">Delete</option>
          </select>
          <span class="text-[13px] font-medium text-gray-400" id="tx-count">0 transactions</span>
        </div>

        <div class="bg-white rounded-[1.25rem] shadow-sm border border-gray-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr
                  class="border-y border-gray-100 text-gray-400 text-[10px] font-black uppercase tracking-widest bg-gray-50/50">
                  <th class="px-6 py-4">Date / Time</th>
                  <th class="px-6 py-4">Item</th>
                  <th class="px-6 py-4">Type</th>
                  <th class="px-6 py-4">Before</th>
                  <th class="px-6 py-4">After</th>
                  <th class="px-6 py-4">Delta</th>
                  <th class="px-6 py-4">Notes</th>
                </tr>
              </thead>
              <tbody id="tx-body" class="divide-y divide-gray-100">
                <tr>
                  <td colspan="7" class="px-8 py-12 text-center text-sm font-medium text-gray-400">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script>
    requireAuth();
    initNav('transactions');

    let allTx = [];

    const BADGE = {
      stock_in: 'bg-emerald-50 text-emerald-700',
      stock_out: 'bg-red-50 text-red-700',
      create: 'bg-blue-50 text-blue-700',
      delete: 'bg-gray-100 text-gray-600',
      update: 'bg-yellow-50 text-yellow-700'
    };

    async function loadTransactions() {
      const tb = document.getElementById('tx-body');
      tb.innerHTML = '<tr><td colspan="7" class="px-8 py-12 text-center text-sm font-medium text-gray-400">Loading...</td></tr>';
      try {
        allTx = await getTransactions();
        applyFilters();
      } catch (e) {
        tb.innerHTML = `<tr><td colspan="7" class="px-8 py-12 text-center text-sm font-medium text-red-500">${e.message}</td></tr>`;
      }
    }

    function applyFilters() {
      const typeFilter = document.getElementById('tx-filter').value;
      const search = document.getElementById('tx-search').value.toLowerCase();
      const filtered = allTx.filter(t => {
        if (typeFilter && t.changeType !== typeFilter) return false;
        if (search && !(t.itemName || '').toLowerCase().includes(search)) return false;
        return true;
      });
      renderTable(filtered);
    }

    function renderTable(rows) {
      const tb = document.getElementById('tx-body');
      document.getElementById('tx-count').textContent = `${rows.length} transaction${rows.length !== 1 ? 's' : ''}`;
      if (!rows.length) {
        tb.innerHTML = '<tr><td colspan="7" class="px-8 py-12 text-center text-sm font-medium text-gray-400">No transactions found.</td></tr>';
        return;
      }
      tb.innerHTML = rows.map(t => {
        const dt = t.createdAt ? new Date(t.createdAt).toLocaleString() : '—';
        const delta = t.quantityDelta ?? 0;
        const deltaStr = delta > 0
          ? `<span class="text-emerald-600 font-bold">+${delta}</span>`
          : delta < 0
            ? `<span class="text-red-600 font-bold">${delta}</span>`
            : `<span class="text-gray-400">0</span>`;
        const badge = `<span class="px-2 py-0.5 text-[10px] font-bold uppercase rounded-md ${BADGE[t.changeType] || 'bg-gray-100 text-gray-600'}">${(t.changeType || '').replace('_', ' ')}</span>`;
        return `<tr class="hover:bg-gray-50/80 transition-colors">
          <td class="px-6 py-3 text-[12px] text-gray-500 whitespace-nowrap">${dt}</td>
          <td class="px-6 py-3 font-bold text-[13px] text-gray-900">${t.itemName || '—'}</td>
          <td class="px-6 py-3">${badge}</td>
          <td class="px-6 py-3 text-[13px] text-gray-600">${t.quantityBefore ?? '—'}</td>
          <td class="px-6 py-3 text-[13px] text-gray-600">${t.quantityAfter ?? '—'}</td>
          <td class="px-6 py-3">${deltaStr}</td>
          <td class="px-6 py-3 text-[12px] text-gray-400">${t.notes || '—'}</td>
        </tr>`;
      }).join('');
    }

    loadTransactions();
  </script>
</body>

</html>
