<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>InventoryIQ | Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#f9f9ff", "error": "#ba1a1a", "error-container": "#ffdad6", "inverse-on-surface": "#eff0fa",
            "inverse-primary": "#aac7ff", "inverse-surface": "#2d3038", "on-background": "#181c22", "on-error": "#ffffff",
            "on-error-container": "#93000a", "on-primary": "#ffffff", "on-primary-container": "#fefcff", "on-primary-fixed": "#001b3e",
            "on-primary-fixed-variant": "#00458d", "on-secondary": "#ffffff", "on-secondary-container": "#405882", "on-secondary-fixed": "#001b3e",
            "on-secondary-fixed-variant": "#2e4770", "on-surface": "#181c22", "on-surface-variant": "#414753", "on-tertiary": "#ffffff",
            "on-tertiary-container": "#fffbff", "on-tertiary-fixed": "#321200", "on-tertiary-fixed-variant": "#763400", "outline": "#717785",
            "outline-variant": "#c1c6d5", "primary": "#005ab4", "primary-container": "#0873df", "primary-fixed": "#d6e3ff",
            "primary-fixed-dim": "#aac7ff", "secondary": "#465f89", "secondary-container": "#b7cfff", "secondary-fixed": "#d6e3ff",
            "secondary-fixed-dim": "#afc7f7", "surface": "#f9f9ff", "surface-bright": "#f9f9ff", "surface-container": "#ecedf7",
            "surface-container-high": "#e6e8f1", "surface-container-highest": "#e0e2ec", "surface-container-low": "#f2f3fd", "surface-container-lowest": "#ffffff",
            "surface-dim": "#d8dae3", "surface-tint": "#005db8", "surface-variant": "#e0e2ec", "tertiary": "#964400",
            "tertiary-container": "#bd5700", "tertiary-fixed": "#ffdbc9", "tertiary-fixed-dim": "#ffb68c",
            "primary-dim": "#00458d", "secondary-dim": "#2e4770", "tertiary-dim": "#763400", "error-dim": "#93000a",
            "slate-950": "#f9f9ff", "slate-400": "#414753", "slate-500": "#717785", "slate-200": "#181c22"
          },
          fontFamily: { "body": ["Inter"], "headline": ["Inter"] },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="selection:bg-primary/30 antialiased">
  <div class="flex items-center justify-center min-h-[100dvh] p-4 text-left relative bg-background">

    <!-- Auth Card -->
    <div
      class="bg-surface-container-lowest w-full max-w-md rounded-[1.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.05)] border border-outline-variant/30 overflow-hidden z-10 relative">
      <!-- Card header -->
      <div class="bg-[#1864c0] h-36 relative flex items-center justify-center">
        <svg class="absolute inset-0 w-full h-full opacity-20" xmlns="http://www.w3.org/2000/svg">
          <pattern id="net-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 0 0 L 40 40 M 40 0 L 0 40" stroke="white" stroke-width="0.5" fill="none" />
            <circle cx="20" cy="20" r="1.5" fill="white" />
          </pattern>
          <rect x="0" y="0" width="100%" height="100%" fill="url(#net-pattern)" />
        </svg>
        <div class="relative z-10 w-20 h-20 bg-white rounded-2xl shadow-md flex items-center justify-center">
          <div class="w-12 h-12">
            <svg viewBox="0 0 100 100" class="w-full h-full">
              <polygon points="50,15 85,35 50,55 15,35" fill="#fbbd5c" />
              <polygon points="15,35 50,55 50,90 15,70" fill="#f26d5b" />
              <polygon points="85,35 50,55 50,90 85,70" fill="#9c3f91" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Card body -->
      <div class="p-8">
        <div class="text-center mb-8">
          <h1 id="auth-title" class="text-2xl font-bold text-on-surface mb-1 tracking-tight">Welcome back</h1>
          <p id="auth-subtitle" class="text-on-surface-variant text-sm">Manage your inventory with precision</p>
        </div>

        <div id="login-form" class="auth-form active space-y-5">
          <div>
            <label class="block text-sm font-semibold text-on-surface mb-2">Email address</label>
            <div class="relative flex items-center">
              <span class="material-symbols-outlined absolute left-3 text-outline text-xl">mail</span>
              <input type="email" id="login-email"
                class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-sm shadow-sm"
                placeholder="name@company.com" />
            </div>
          </div>

          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="block text-sm font-semibold text-on-surface">Password</label>
              <a href="#" class="text-sm text-primary font-semibold hover:underline">Forgot Password?</a>
            </div>
            <div class="relative flex items-center">
              <span class="material-symbols-outlined absolute left-3 text-outline text-xl">lock</span>
              <input type="password" id="login-password"
                class="w-full pl-10 pr-10 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-sm shadow-sm tracking-widest"
                placeholder="••••••••" onkeydown="if(event.key==='Enter') handleLogin()" />
              <button
                class="material-symbols-outlined absolute right-3 text-outline hover:text-on-surface transition-colors cursor-pointer text-xl"
                tabindex="-1">visibility</button>
            </div>
          </div>

          <div class="flex items-center gap-2 pt-1 pb-1">
            <input type="checkbox" id="remember"
              class="w-4 h-4 rounded border-outline-variant/50 text-primary focus:ring-primary" />
            <label for="remember" class="text-sm text-on-surface-variant">Remember this device</label>
          </div>

          <button
            class="w-full bg-primary hover:bg-primary-dim text-on-primary py-3 rounded-lg font-bold transition-all cursor-pointer flex justify-center items-center gap-2 text-base shadow-sm"
            onclick="handleLogin()">
            Login
            <span class="material-symbols-outlined text-xl">arrow_forward</span>
          </button>

          <div id="login-msg" class="hidden mt-4 p-3 rounded-md text-center text-sm font-medium"></div>

          <div class="pt-6 border-t border-outline-variant/30 mt-6 text-center text-sm text-on-surface-variant">
            Don't have an account? <span class="text-primary font-bold cursor-pointer hover:underline"
              onclick="switchAuthTab('register')">Sign Up</span>
          </div>
        </div>

        <div id="register-form" class="auth-form space-y-5">
          <div>
            <label class="block text-sm font-semibold text-on-surface mb-2">Email address</label>
            <div class="relative flex items-center">
              <span class="material-symbols-outlined absolute left-3 text-outline text-xl">mail</span>
              <input type="email" id="reg-email"
                class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-sm shadow-sm"
                placeholder="name@company.com" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-on-surface mb-2">Password</label>
            <div class="relative flex items-center">
              <span class="material-symbols-outlined absolute left-3 text-outline text-xl">lock</span>
              <input type="password" id="reg-password"
                class="w-full pl-10 pr-10 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary text-sm shadow-sm"
                placeholder="Create password" />
            </div>
          </div>
          <button
            class="w-full mt-2 bg-primary hover:bg-primary-dim text-on-primary py-3 rounded-lg font-bold transition-all cursor-pointer flex justify-center items-center gap-2 text-base shadow-sm"
            onclick="handleRegister()">
            Create Account
            <span class="material-symbols-outlined text-xl">person_add</span>
          </button>
          <div id="reg-msg" class="hidden mt-4 p-3 rounded-md text-center text-sm font-medium"></div>

          <div class="pt-6 border-t border-outline-variant/30 mt-6 text-center text-sm text-on-surface-variant">
            Already have an account? <span class="text-primary font-bold cursor-pointer hover:underline"
              onclick="switchAuthTab('login')">Log In</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="absolute bottom-6 w-full text-center hidden sm:block">
      <div class="mb-2 text-on-surface-variant text-sm flex justify-center items-center gap-2">
        <span class="font-bold text-on-surface">InventoryIQ</span>
        <span class="text-outline-variant/50">|</span>
        <span>© 2024 InventoryIQ. All rights reserved.</span>
      </div>
      <div class="text-sm text-on-surface-variant flex gap-6 justify-center mt-3">
        <a href="#" class="hover:text-primary transition-colors">Privacy Policy</a>
        <a href="#" class="hover:text-primary transition-colors">Terms of Service</a>
        <a href="#" class="hover:text-primary transition-colors">Help Center</a>
      </div>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    function switchAuthTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('active', isLogin);
      document.getElementById('register-form').classList.toggle('active', !isLogin);
      const title = document.getElementById('auth-title');
      const subtitle = document.getElementById('auth-subtitle');
      if (isLogin) {
        title.textContent = 'Welcome back';
        subtitle.textContent = 'Manage your inventory with precision';
      } else {
        title.textContent = 'Create Account';
        subtitle.textContent = 'Start managing your inventory today';
      }
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pwd = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');
      msg.className = "mt-4 p-3 rounded-xl text-center text-sm font-medium";
      if (!email || !pwd) {
        msg.classList.add('bg-error-container/20', 'text-error', 'block');
        msg.textContent = 'Enter email & password.';
        return;
      }
      msg.classList.add('bg-surface-variant', 'text-on-surface', 'block');
      msg.textContent = 'Logging in...';
      const { status, data } = await authLogin(email, pwd);
      if (status === 200) {
        sessionStorage.setItem('authToken', data.token);
        sessionStorage.setItem('userEmail', data.email);
        window.location.href = 'dashboard.html';
      } else {
        msg.className = "mt-4 p-3 rounded-xl text-center text-sm font-medium block bg-error-container/20 text-error";
        msg.textContent = data.message || 'Login failed.';
      }
    }

    async function handleRegister() {
      const email = document.getElementById('reg-email').value.trim();
      const pwd = document.getElementById('reg-password').value;
      const msg = document.getElementById('reg-msg');
      msg.className = "mt-4 p-3 rounded-xl text-center text-sm font-medium";
      if (!email || !pwd) {
        msg.classList.add('bg-error-container/20', 'text-error', 'block');
        msg.textContent = 'Enter email & password.';
        return;
      }
      if (pwd.length < 6) {
        msg.classList.add('bg-error-container/20', 'text-error', 'block');
        msg.textContent = 'Password >= 6 characters.';
        return;
      }
      msg.classList.add('bg-surface-variant', 'text-on-surface', 'block');
      msg.textContent = 'Creating account...';
      const { status, data } = await authRegister(email, pwd);
      if (status === 200) {
        msg.className = "mt-4 p-3 rounded-xl text-center text-sm font-medium block bg-tertiary-container/30 text-tertiary";
        msg.textContent = 'Account created!';
        setTimeout(() => switchAuthTab('login'), 1500);
      } else {
        msg.className = "mt-4 p-3 rounded-xl text-center text-sm font-medium block bg-error-container/20 text-error";
        msg.textContent = data.message || 'Registration failed.';
      }
    }

    window.onload = function () {
      if (sessionStorage.getItem('userEmail')) window.location.href = 'dashboard.html';
    };
  </script>
</body>

</html>
